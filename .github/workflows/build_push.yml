name: build-push-deploy

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Compute image name (lowercase)
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:main
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Debug secrets check
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "❌ VPS_HOST is empty"
          else
            echo "✅ VPS_HOST is set (length: $(echo -n '${{ secrets.VPS_HOST }}' | wc -c))"
          fi
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "❌ VPS_SSH_KEY is empty"
          else
            echo "✅ VPS_SSH_KEY is set (length: $(echo -n '${{ secrets.VPS_SSH_KEY }}' | wc -c))"
            echo "Key starts with: $(echo '${{ secrets.VPS_SSH_KEY }}' | head -c 30)..."
          fi

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_IMAGE: ${{ env.IMAGE }}:main
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          debug: true
          envs: DEPLOY_IMAGE
          script: |
            cd /docker/relatable
            docker compose pull
            docker compose up -d
            docker image prune -f
